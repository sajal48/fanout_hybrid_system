spring:
  # PostgreSQL Configuration (using container hostname)
  datasource:
    url: jdbc:postgresql://postgres:5432/twitter_feed
    username: postgres
    password: ""

  # Cassandra and Redis Configuration (using container hostnames)
  data:
    cassandra:
      keyspace-name: twitter_feeds
      contact-points: cassandra
      port: 9042
      local-datacenter: dc1
    redis:
      host: redis
      port: 6379
