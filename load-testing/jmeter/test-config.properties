# JMeter Load Test Configuration
# This file allows you to easily adjust test parameters without editing the JMX file

# Test Plan Settings
TEST_NAME=Twitter Feed System Load Test
BASE_URL=localhost
PORT=8080
API_PATH=/api/v1

# Thread Group 1: Browse Users
BROWSE_USERS_COUNT=30
BROWSE_USERS_RAMPUP=60
BROWSE_USERS_LOOPS=10
BROWSE_USERS_THINK_TIME=2000
BROWSE_USERS_THINK_VARIANCE=1000

# Thread Group 2: Active Users (Content Creators)
ACTIVE_USERS_COUNT=15
ACTIVE_USERS_RAMPUP=30
ACTIVE_USERS_LOOPS=5
ACTIVE_USERS_POST_DELAY=3000
ACTIVE_USERS_POST_VARIANCE=2000

# Thread Group 3: Celebrity Feed Consumers
CELEBRITY_CONSUMERS_COUNT=20
CELEBRITY_CONSUMERS_RAMPUP=45
CELEBRITY_CONSUMERS_LOOPS=15
CELEBRITY_CONSUMERS_INTERVAL=1500

# Test Duration Settings (if using duration-based testing)
TEST_DURATION_SECONDS=300
STARTUP_DELAY_SECONDS=0

# Results and Reporting
SAVE_RESPONSE_DATA=false
SAVE_ASSERTIONS=true
SAVE_RESPONSE_HEADERS=false
SAVE_REQUEST_HEADERS=false

# Performance Thresholds (for reference)
MAX_RESPONSE_TIME_MS=500
MAX_ERROR_RATE_PERCENT=1.0
MIN_THROUGHPUT_RPS=50

# CSV Data Configuration
USER_IDS_FILE=data/user_ids.csv
CELEBRITY_IDS_FILE=data/celebrity_ids.csv
POST_CONTENT_FILE=data/post_content.csv

# HTTP Configuration
CONNECTION_TIMEOUT_MS=5000
RESPONSE_TIMEOUT_MS=10000
CONCURRENT_POOL_SIZE=6

# Notes:
# - To apply these settings, you need to modify the JMX file or use JMeter properties
# - For quick changes, use JMeter's GUI mode to adjust Thread Group settings
# - For CI/CD, consider using JMeter properties: -JuserCount=50 -JrampUp=120